<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Namn-generator</title>
</head>
<body>

<h2>Namn-generator</h2>
<button onclick="generateName()">Generera namn</button>
<p id="result"></p>

<script>
// --- Förnamn ---
const firstNames = [
"Ida","Lia","Carmen","Malin","Agne","Gisela","Lovisa","Malva","Sofia","Ella",
"Mathilda","Tora","Alma","Julia","Katarina","Ellen","Tova","Emma","Moa","Elin",
"Lily","Magdalena","Ebba","My","Clara","Sheryl","Wilma","Kerstin","Ylva",
"Irma","Ingrid","Iisa","Freja","Amanda","Emilia","Tindra","Agnes","Eda",
"Tovalisa","Casandra","Rut","Nelly","Nova","Kajsa","Liv","Zoe","Smilla",
"Siri","Natalie","Alva","Frida","Selma","Ronja","Lea","Signe","Vera","Eira"
];

// --- Vanliga efternamn ---
const normalLastNames = [
"Andersson","Johansson","Nilsson","Eriksson","Larsson","Olsson","Persson",
"Lindberg","Bergström","Nyström","Björkman","Åberg","Forsberg","Lindström",
"Svensson","Karlsson","Noreblad","Tagesson","Stenström","Hammarström","Sandberg",
"Dahlqvist","Ohlsson","Brunér","Rytterholm","Sandvik","Ekberg","Bondesson",
"Liljeqvist","Holmström","Isaksson","Gustavsson","Liljekvist","Blombäck","Maria",
"Nyberg","Nordström","Engström","Sjöberg","Hedlund","Lundquist","Hedström"
];

// --- Konstiga/udda efternamn ---
const weirdLastNames = [
"Trölle","Norinder Nordin","Cederberg","Fjeldstad","Orraryd","Niesel","Tillander",
"Wesling","Blauert","Lindarp","Blanco","Askanius","Risholm","Martel","Lundberg",
"Göteborg","Adebäck","Zlatan","Crona","Peng","Noé","Glaser","Danell","Busk",
"Mannheimer","Siffert","Brus","Stening","Rytterholm","Mannertorn","Jernspets",
"Tael","Maronsi","Kolsmyr","Powell","Baralt","Hammarsköljd","Persliden","Flygt",
"Vidunder","von Lidl","Kikkoman","De Geer","Amazon","Pharmansson","Filipovic",
"Hitler","Stalin","Putin","Eichmann","Göring","Törring","Nordkusten","Ejiksson",
"Rolfhamre","Pappa","Dubbel","Aktersnurra","Singelman","Bünger","Stadsholm",
"Vintervik","Skärgård","Polcirkeln","Havsmark","Peppar","Saltkar","McArthur",
"Kreku","Hofvander","Aberdeen","DeFoe","Aerobics","Alfresco","Alzheimer","Bleckhard",
"Kvarg","Malkovich","Snygg","von Plutten","Ikaros","Antwerpen","Silfverhjelm",
"Rosencrantz","Stålhammar","Leijonflycht","Tersmeden","Gyldenstolpe","Adelcreutz",
"Stiernhielm","Wachtmeister","Nattkrona"
];

function randomItem(list) {
    return list[Math.floor(Math.random() * list.length)];
}

// Skapar egna förnamn ibland
function makeFakeFirstName() {
    const n1 = randomItem(firstNames);
    const n2 = randomItem(firstNames);
    const part1 = n1.slice(0, Math.ceil(n1.length/2));
    const part2 = n2.slice(Math.floor(n2.length/2));
    return part1 + part2;
}

function generateName() {
    // Förnamn: ibland nytt
    let first;
    if (Math.random() < 0.3) {
        first = makeFakeFirstName();
    } else {
        first = randomItem(firstNames);
    }

    // Efternamn: slumpa kategori för varje position
    const categories = [normalLastNames, weirdLastNames];
    const last1 = randomItem(randomItem(categories));
    const last2 = randomItem(randomItem(categories));

    document.getElementById("result").textContent =
        first + " " + last1 + " " + last2;
}
</script>

</body>
</html>
